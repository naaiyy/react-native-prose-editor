name: Publish

on:
  workflow_dispatch:
    inputs:
      confirm_release:
        description: 'Type RELEASE to publish @openeditor/react-native-prose-editor to npm'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    if: ${{ github.event.inputs.confirm_release == 'RELEASE' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
          package-manager-cache: false

      - name: Install root dependencies
        run: npm ci

      - name: Install example dependencies
        run: npm --prefix example ci

      - name: Typecheck package
        run: npm run typecheck

      - name: Build package
        run: npm run build

      - name: Typecheck example
        run: npm --prefix example run typecheck

      - name: Run JavaScript tests
        run: npm test

      - name: Publish to npm
        run: npm publish
