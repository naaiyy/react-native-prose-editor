name: Publish

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
          package-manager-cache: false

      - name: Install root dependencies
        run: npm ci

      - name: Typecheck package
        run: npm run typecheck

      - name: Build package
        run: npm run build

      - name: Run JavaScript tests
        run: npm test

      - name: Publish to npm
        run: npm publish
